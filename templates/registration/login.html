{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Vibe Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body style="background:#fff8f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;">

<div style="width:100%;max-width:420px">
  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="/" class="logo" style="justify-content:center;font-size:36px;">Vibe<span>.</span></a>
    <p style="color:#8a6555;font-size:14px;margin-top:6px;font-weight:500">Connect with people you love</p>
  </div>

  <!-- Card -->
  <div class="card-style p-8" style="background:white">
    <h2 class="font-extrabold text-xl mb-6" style="color:#29170c">Welcome back 👋</h2>

    {% if form.errors %}
      <div class="alert alert-error mb-4">
        Incorrect username or password. Try again.
      </div>
    {% endif %}

    <form method="post" class="flex flex-col gap-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-bold mb-1.5" style="color:#29170c">Username</label>
        <input type="text" name="username" class="form-input" placeholder="your_username" autocomplete="username" required />
      </div>
      <div>
        <label class="block text-sm font-bold mb-1.5" style="color:#29170c">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn-primary w-full justify-center mt-2" style="padding:12px;font-size:15px">
        <span class="material-symbols-outlined">login</span>
        Sign In
      </button>
    </form>

    <div style="border-top:2px solid #ffeadf;margin-top:24px;padding-top:20px;text-align:center">
      <p style="font-size:14px;color:#8a6555;font-weight:500">
        Don't have an account?
        <a href="{% url 'register' %}" style="color:#bb010d;font-weight:700;text-decoration:none">Create one</a>
      </p>
    </div>
  </div>

  <!-- Decorative -->
  <div class="flex justify-center gap-2 mt-6">
    <div style="width:8px;height:8px;border-radius:50%;background:#bb010d;border:2px solid #29170c"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#ffeadf;border:2px solid #29170c"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#29170c;border:2px solid #29170c"></div>
  </div>
</div>

</body>
</html>
